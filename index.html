<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GymOps</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ═══════════════════════════════════
       IDLE STATE
  ════════════════════════════════════ -->
  <div id="screen-idle" class="screen">
    <div class="idle-container">
      <h1 class="app-title">GymOps</h1>
      <p class="idle-subtitle">Ready to train</p>
      <button class="btn-primary btn-large" id="btn-start">Start Workout</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════
       ACTIVE STATE
  ════════════════════════════════════ -->
  <div id="screen-active" class="screen">
    <div class="workout-container">

      <!-- Above the fold -->
      <div class="top-section">

        <div class="exercise-row">
          <span class="exercise-name" id="exercise-name">Seated Shoulder Press</span>
          <button class="btn-text" id="btn-change-exercise">Change</button>
        </div>

        <div class="set-info-row">
          <div class="stat-block">
            <span class="stat-label">Set</span>
            <span class="stat-value" id="set-number">1</span>
          </div>
          <div class="stat-block">
            <span class="stat-label">Prev</span>
            <span class="stat-value" id="last-set">—</span>
          </div>
        </div>

        <p class="last-session" id="last-session">Last session: No history</p>

        <div class="input-section">
          <div class="input-row">
            <input
              type="text"
              id="input-weight"
              class="set-input"
              placeholder="Weight"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="off"
            >
            <input
              type="text"
              id="input-reps"
              class="set-input"
              placeholder="Reps"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="off"
            >
          </div>
          <p class="input-error hidden" id="input-error">Enter weight and reps</p>
        </div>

        <div class="action-buttons">
          <button class="btn-secondary" id="btn-undo">Undo</button>
          <button class="btn-danger" id="btn-finish">Finish</button>
        </div>

      </div>

      <!-- Recent sets log -->
      <div class="sets-log">
        <p class="sets-log-title">Recent Sets</p>
        <div id="sets-list" class="sets-list">
          <!-- Populated by JS -->
        </div>
        <p class="sets-empty hidden" id="sets-empty">No sets logged yet</p>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════
       COMPLETED STATE
  ════════════════════════════════════ -->
  <div id="screen-completed" class="screen">
    <div class="completed-container">
      <p class="completed-label">Workout Complete</p>
      <p class="completed-summary" id="session-summary">5 sets logged</p>
      <div class="completed-actions">
        <button class="btn-secondary hidden" id="btn-resume">Resume Last Workout</button>
        <button class="btn-secondary" id="btn-export">Export CSV</button>
        <button class="btn-primary btn-large" id="btn-new-workout">Start New Workout</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════
       EXERCISE PICKER (bottom sheet)
  ════════════════════════════════════ -->
  <div id="exercise-picker" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title" id="modal-title">Select Exercise</p>
      <ul class="exercise-list" id="exercise-list">
        <!-- Populated by JS -->
      </ul>
      <div class="other-name-section hidden" id="other-name-section">
        <input
          type="text"
          id="other-name-input"
          class="set-input other-name-input"
          placeholder="Exercise name"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
        <p class="input-error hidden" id="other-name-error">Enter an exercise name</p>
        <button class="btn-primary" id="btn-other-done">Done</button>
      </div>
      <button class="btn-text modal-cancel" id="btn-close-picker">Cancel</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════
       CONFIRM FINISH (bottom sheet)
  ════════════════════════════════════ -->
  <div id="confirm-finish" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="confirm-finish-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">End workout?</p>
      <div class="modal-actions">
        <button class="btn-danger btn-large" id="btn-confirm-end">End Workout</button>
        <button class="btn-secondary" id="btn-cancel-end">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════
       INACTIVITY PROMPT (bottom sheet)
  ════════════════════════════════════ -->
  <div id="inactivity-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">Still working out?</p>
      <div class="modal-actions">
        <button class="btn-primary btn-large" id="btn-inactivity-continue">Yes, continue</button>
        <button class="btn-danger" id="btn-inactivity-end">End workout</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="lib/sql-wasm.js"></script>
  <script src="js/db.js"></script>
  <script src="js/gdrive.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
